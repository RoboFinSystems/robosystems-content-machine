<!-- @dsCard group="Components" viewport="700x430" name="Data — Metric, Callout, Bar, Compare" subtitle="The research-slide data primitives" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-stage-glow); font-family: var(--font-body); padding: 26px 30px; box-sizing: border-box; }
  #root { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; grid-column: 1 / -1; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const NS = window.RoboSystemsContentDesignSystem_746ae7;
    const { MetricCard, Callout, BarChart, ComparisonTable } = NS;
    function Demo() {
      return (
        <>
          <div className="grid3">
            <MetricCard label="Q1 Revenue" value="$300.2M" change="+7.4% YoY" changeTone="positive" />
            <MetricCard label="Effective tax" value="76%" change="280E in force" changeTone="negative" highlight />
            <MetricCard label="Net cash" value="$344.5M" change="least levered" changeTone="neutral" />
          </div>
          <Callout label="Annual cost of 280E" value="$92M" context="Income tax exceeded operating income." tone="negative" align="left" />
          <BarChart
            data={{ FY22: 1017, FY23: 1054, FY24: 1137, FY25: 1175 }}
            highlight="FY25"
            format={(v) => '$' + (v/1000).toFixed(2) + 'B'}
            height={150}
          />
          <ComparisonTable
            left={{ title: 'Bull', points: ['Only profitable MSO', 'Net cash'] }}
            right={{ title: 'Bear', points: ['Hearing Jun 29', 'Margins compressing'] }}
            style={{ gridColumn: '1 / -1' }}
          />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
