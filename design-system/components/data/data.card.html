<!-- @dsCard group="Components" viewport="700x620" name="Data — Metric, Callout, Bar, Line, Compare" subtitle="The research-slide data primitives" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-stage-glow); font-family: var(--font-body); padding: 26px 30px; box-sizing: border-box; }
  #root { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; grid-column: 1 / -1; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const NS = window.RoboSystemsContentDesignSystem_746ae7;
    const { MetricCard, Callout, BarChart, LineChart, ComparisonTable } = NS;
    function Demo() {
      return (
        <>
          <div className="grid3">
            <MetricCard label="Q1 Revenue" value="$295.0M" change="+9.2% YoY" changeTone="positive" />
            <MetricCard label="Effective tax" value="44%" change="above-peer drag" changeTone="negative" highlight />
            <MetricCard label="Net cash" value="$210.0M" change="low leverage" changeTone="neutral" />
          </div>
          <Callout label="One-time charge, FY2025" value="$40M" context="A non-recurring item that masked the underlying margin." tone="negative" align="left" />
          <BarChart
            data={{ FY22: 742, FY23: 835, FY24: 940, FY25: 1040 }}
            highlight="FY25"
            format={(v) => '$' + (v/1000).toFixed(2) + 'B'}
            height={150}
          />
          <LineChart
            data={{ series: {
              'Gross margin': { FY22: 49, FY23: 50, FY24: 52, FY25: 51 },
              'Net margin':   { FY22: 8,  FY23: 11, FY24: 14, FY25: 13 },
            } }}
            highlight="Net margin"
            format={(v) => v + '%'}
            height={150}
            style={{ gridColumn: '1 / -1' }}
          />
          <ComparisonTable
            left={{ title: 'Bull', points: ['Consistently GAAP profitable', 'Net cash'] }}
            right={{ title: 'Bear', points: ['Catalyst is FY2027-weighted', 'Margins compressing'] }}
            style={{ gridColumn: '1 / -1' }}
          />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
