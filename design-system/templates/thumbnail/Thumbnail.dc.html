<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="YouTube Thumbnail" description="The 16:9 click-driver frame — one cognitive-dissonance hero metric, huge and centered, with a banner, two secondary stats, ticker + RoboSystems mark. Readable at 1cm wide. Example content is a fictional placeholder (Example Corp / EXCO)." -->
<helmet>
<script src="./ds-base.js"></script>
<style> body { margin: 0; } </style>
</helmet>
<div style="background:#04060d; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:48px; font-family:'Space Grotesk',system-ui,sans-serif;">
  <section data-screen-label="Thumbnail" style="position:relative; width:1280px; height:720px; overflow:hidden; border-radius:14px; box-shadow:0 30px 90px -30px rgba(0,0,0,0.85); background:radial-gradient(100% 80% at 50% 18%, rgba(59,122,245,0.22), transparent 60%), #0a0e1a; display:flex; flex-direction:column; padding:64px 72px;">

    <!-- Top row: banner + ticker -->
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <x-import component-from-global-scope="RoboSystemsContentDesignSystem_746ae7.Badge" tone="accent" solid="{{ true }}" style="font-size:18px; padding:0.6em 1.1em" hint-size="220px,40px">Coverage Update</x-import>
      <span style="font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:600; color:#c3ccdb; letter-spacing:0.04em;">NYSE: EXCO</span>
    </div>

    <!-- Hero metric -->
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
      <span style="font-family:'Orbitron',sans-serif; font-weight:600; font-size:30px; letter-spacing:0.06em; text-transform:uppercase; color:#8593aa;">Forward</span>
      <span style="font-family:'Orbitron',sans-serif; font-weight:900; font-size:240px; line-height:0.86; letter-spacing:-0.03em; color:#3b7af5; text-shadow:0 0 90px rgba(59,122,245,0.55); margin-top:8px;">12x</span>
      <span style="font-family:'Orbitron',sans-serif; font-weight:700; font-size:42px; color:#f4f7fb; margin-top:8px;">adjusted P/E</span>
    </div>

    <!-- Secondary metrics + brand -->
    <div style="display:flex; align-items:flex-end; justify-content:space-between;">
      <div style="display:flex; gap:48px;">
        <div>
          <div style="font-size:16px; text-transform:uppercase; letter-spacing:0.12em; color:#5a6783; font-weight:600;">Revenue</div>
          <div style="font-family:'Orbitron',sans-serif; font-weight:700; font-size:38px; color:#31c48d; margin-top:4px;">$1.04B</div>
        </div>
        <div>
          <div style="font-size:16px; text-transform:uppercase; letter-spacing:0.12em; color:#5a6783; font-weight:600;">Net cash</div>
          <div style="font-family:'Orbitron',sans-serif; font-weight:700; font-size:38px; color:#6098fa; margin-top:4px;">$210M</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:14px; color:#fff;">
        <x-import component-from-global-scope="RoboSystemsContentDesignSystem_746ae7.BrandMark" size="{{ 48 }}" style="color:#fff" hint-size="48px,48px"></x-import>
        <span style="font-family:'Orbitron',sans-serif; font-weight:700; font-size:26px;">RoboSystems</span>
      </div>
    </div>

  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() { return {}; }
}
</script>
</body>
</html>
