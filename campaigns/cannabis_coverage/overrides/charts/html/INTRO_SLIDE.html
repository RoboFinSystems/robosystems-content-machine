<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intro Slide — Cannabis Coverage</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030712;
    color: #fff;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle gradient glow behind content */
  .bg-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(0, 212, 170, 0.06) 0%, rgba(27, 58, 87, 0.04) 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .logo {
    height: 80px;
    width: auto;
    margin-bottom: 32px;
    opacity: 0.95;
  }

  .brand {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #F9FAFB;
    letter-spacing: 8px;
    margin-bottom: 20px;
  }

  .accent-line {
    width: 160px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00D4AA, transparent);
    margin: 0 auto 32px;
  }

  .campaign-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #00D4AA;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .campaign-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 42px;
    font-weight: 600;
    color: #F9FAFB;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 24px;
  }

  .campaign-subtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #6B7280;
    letter-spacing: 1px;
  }

  .campaign-subtitle a {
    color: #6098FA;
    text-decoration: none;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    border-top: 1px solid #111827;
  }

  .bottom-bar span {
    font-size: 13px;
    color: #374151;
    letter-spacing: 0.5px;
  }

  .bottom-url {
    color: #4B5563 !important;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <img src="robosystems_logo.svg" alt="RoboSystems" class="logo">
    <div class="brand">ROBOSYSTEMS</div>
    <div class="accent-line"></div>
    <div class="campaign-label">Initiating Coverage</div>
    <div class="campaign-title">Cannabis Industry</div>
    <div class="campaign-subtitle">SEC Filing Analysis &middot; Every Public Company &middot; One Knowledge Graph</div>
  </div>
  <div class="bottom-bar">
    <span>Every Public Company. One Knowledge Graph.</span>
    <span class="bottom-url">robosystems.ai</span>
  </div>
</body>
</html>
