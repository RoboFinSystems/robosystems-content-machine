<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outro Slide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 1920px; height: 1080px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; }
  .logo { height: 48px; width: auto; margin-bottom: 20px; opacity: 0.9; }
  .brand { font-size: 22px; font-weight: 600; color: #e0e0e0; letter-spacing: 5px; margin-bottom: 32px; }
  .accent { width: 80px; height: 3px; background: #1e88e5; margin: 0 auto 32px; }
  .cta { font-size: 18px; color: #888; margin-bottom: 12px; }
  .url { font-size: 24px; font-weight: 700; color: #1e88e5; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="container">
  <img src="robosystems_logo.png" alt="RoboSystems" class="logo">
  <div class="brand">ROBOSYSTEMS</div>
  <div class="accent"></div>
  <div class="cta">Subscribe for more SEC filing analysis</div>
  <div class="url">robosystems.ai</div>
</div>
</body>
</html>
