<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow Trend (FY2022-FY2025)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .frame {
            width: 1920px;
            height: 1080px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Top Bar ─────────────────────────────────── */
        .top-bar {
            height: 52px;
            background: linear-gradient(90deg, #111111 0%, #161616 100%);
            border-bottom: 2px solid #1e88e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            height: 24px;
            width: auto;
            opacity: 0.9;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .ticker-badge {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ticker {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .filing-badge {
            font-size: 12px;
            font-weight: 600;
            color: #1e88e5;
            background: rgba(30, 136, 229, 0.12);
            border: 1px solid rgba(30, 136, 229, 0.3);
            padding: 4px 12px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        /* ─── Title Bar ───────────────────────────────── */
        .title-bar {
            padding: 16px 32px 8px;
            flex-shrink: 0;
        }

        .chart-title {
            font-size: 26px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        .chart-subtitle {
            font-size: 15px;
            color: #888888;
            margin-top: 6px;
        }

        /* ─── Chart Area ──────────────────────────────── */
        .chart-area {
            flex: 1;
            margin: 0 24px;
            padding: 16px 24px;
            background: linear-gradient(180deg, #111111 0%, #0d0d0d 100%);
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chart-content {
            width: 100%;
            height: 100%;
        }

        /* ─── Bottom Bar ──────────────────────────────── */
        .bottom-bar {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            flex-shrink: 0;
        }

        .source {
            font-size: 12px;
            color: #555555;
        }

        .brand-url {
            font-size: 12px;
            color: #444444;
            letter-spacing: 0.5px;
        }

        /* ─── Accent line under top bar ───────────────── */
        .accent-line {
            height: 1px;
            background: linear-gradient(90deg, #1e88e5 0%, transparent 60%);
            flex-shrink: 0;
        }

        /* ─── Chart SVG defaults ──────────────────────── */
        svg {
            width: 100%;
            height: 100%;
        }

        .bar-positive { fill: #1e88e5; }
        .bar-negative { fill: #ef5350; }
        .bar-neutral  { fill: #455a64; }
        .bar-accent   { fill: #26c6da; }

        .value-label {
            font-size: 18px;
            fill: #ffffff;
            font-weight: 600;
        }

        .bar-label {
            font-size: 14px;
            fill: #cccccc;
            font-weight: 500;
        }

        .growth-positive {
            font-size: 13px;
            fill: #4caf50;
            font-weight: 600;
        }

        .growth-negative {
            font-size: 13px;
            fill: #ef5350;
            font-weight: 600;
        }

        .axis-line {
            stroke: #333333;
            stroke-width: 1;
        }

        .grid-line {
            stroke: #1a1a1a;
            stroke-width: 0.5;
            stroke-dasharray: 4,4;
        }

        .axis-label {
            font-size: 13px;
            fill: #666666;
        }

        .zero-line {
            stroke: #555555;
            stroke-width: 1.5;
        }

        .zero-label {
            font-size: 12px;
            fill: #777777;
            font-weight: 500;
        }

        .legend-text {
            font-size: 13px;
            fill: #aaaaaa;
        }
    </style>
</head>
<body>
    <div class="frame">

        <!-- Top Bar: Branding + Ticker -->
        <div class="top-bar">
            <div class="brand">
                <img src="robosystems_logo.png" alt="RoboSystems" class="brand-logo">
                <div class="brand-name">RoboSystems</div>
            </div>
            <div class="ticker-badge">
                <span class="ticker">ACME</span>
                <span class="filing-badge">10-K FY2025</span>
            </div>
        </div>
        <div class="accent-line"></div>

        <!-- Title -->
        <div class="title-bar">
            <div class="chart-title">Free Cash Flow Trend (FY2022-FY2025)</div>
            <div class="chart-subtitle">Negative values extend below the zero line to show true cash burn</div>
        </div>

        <!-- Chart Content Area -->
        <div class="chart-area">
            <div class="chart-content">

                <!--
                    EXAMPLE: Bar chart with POSITIVE and NEGATIVE values.

                    KEY DESIGN PRINCIPLES:
                    1. Use SVG with a viewBox that fills the space (1840 x 860 is good for this frame)
                    2. Draw a ZERO LINE across the chart when data has both positive and negative values
                    3. Positive bars grow UPWARD from the zero line
                    4. Negative bars grow DOWNWARD from the zero line
                    5. Bar heights are PROPORTIONAL to their values
                    6. Use large font sizes (18px+ for values, 14px+ for labels)
                    7. Color code: blue (#1e88e5) for positive, red (#ef5350) for negative

                    MATH FOR THIS EXAMPLE:
                    Data: FY2022=$338M, FY2023=$61M, FY2024=-$96M, FY2025=-$298M
                    Max absolute value: $338M
                    Chart area: y=60 to y=760 (700px total)
                    Zero line: positioned so positive space = negative space proportionally
                    With max positive $338M and max negative $298M:
                      Total range = 338 + 298 = 636
                      Zero line y = 60 + (338/636 * 700) = 60 + 372 = 432
                    Positive bars go UP from y=432, negative bars go DOWN from y=432
                    Scale: 1M = 700/636 = 1.1px
                    FY2022: height = 338 * 1.1 = 372px, y = 432 - 372 = 60
                    FY2023: height = 61 * 1.1 = 67px, y = 432 - 67 = 365
                    FY2024: height = 96 * 1.1 = 106px, y = 432 (grows down)
                    FY2025: height = 298 * 1.1 = 328px, y = 432 (grows down)
                -->

                <svg viewBox="0 0 1840 860" preserveAspectRatio="xMidYMid meet">

                    <!-- Grid lines for reference -->
                    <line x1="120" y1="130" x2="1780" y2="130" class="grid-line"/>
                    <line x1="120" y1="280" x2="1780" y2="280" class="grid-line"/>
                    <line x1="120" y1="580" x2="1780" y2="580" class="grid-line"/>
                    <line x1="120" y1="700" x2="1780" y2="700" class="grid-line"/>

                    <!-- Y-axis labels -->
                    <text x="110" y="135" class="axis-label" text-anchor="end">$400M</text>
                    <text x="110" y="285" class="axis-label" text-anchor="end">$200M</text>
                    <text x="110" y="585" class="axis-label" text-anchor="end">-$100M</text>
                    <text x="110" y="705" class="axis-label" text-anchor="end">-$200M</text>

                    <!-- ZERO LINE — the most important element -->
                    <line x1="120" y1="432" x2="1780" y2="432" class="zero-line"/>
                    <text x="110" y="437" class="zero-label" text-anchor="end">$0</text>

                    <!-- FY2022: $338M (POSITIVE — bar goes UP from zero line) -->
                    <rect x="220" y="60" width="200" height="372" class="bar-positive" rx="4"/>
                    <text x="320" y="42" class="value-label" text-anchor="middle">$338M</text>
                    <text x="320" y="820" class="bar-label" text-anchor="middle">FY2022</text>
                    <text x="320" y="845" class="growth-positive" text-anchor="middle">Baseline</text>

                    <!-- FY2023: $61M (POSITIVE — shorter bar goes UP from zero line) -->
                    <rect x="580" y="365" width="200" height="67" class="bar-positive" rx="4"/>
                    <text x="680" y="350" class="value-label" text-anchor="middle">$61M</text>
                    <text x="680" y="820" class="bar-label" text-anchor="middle">FY2023</text>
                    <text x="680" y="845" class="growth-negative" text-anchor="middle">-82%</text>

                    <!-- FY2024: -$96M (NEGATIVE — bar goes DOWN from zero line) -->
                    <rect x="940" y="432" width="200" height="106" class="bar-negative" rx="4"/>
                    <text x="1040" y="558" class="value-label" text-anchor="middle">-$96M</text>
                    <text x="1040" y="820" class="bar-label" text-anchor="middle">FY2024</text>
                    <text x="1040" y="845" class="growth-negative" text-anchor="middle">Negative</text>

                    <!-- FY2025: -$298M (NEGATIVE — taller bar goes DOWN from zero line) -->
                    <rect x="1300" y="432" width="200" height="328" class="bar-negative" rx="4"/>
                    <text x="1400" y="780" class="value-label" text-anchor="middle">-$298M</text>
                    <text x="1400" y="820" class="bar-label" text-anchor="middle">FY2025</text>
                    <text x="1400" y="845" class="growth-negative" text-anchor="middle">-210%</text>

                    <!-- Legend -->
                    <rect x="700" y="10" width="16" height="16" class="bar-positive" rx="2"/>
                    <text x="722" y="23" class="legend-text">Positive FCF</text>
                    <rect x="880" y="10" width="16" height="16" class="bar-negative" rx="2"/>
                    <text x="902" y="23" class="legend-text">Negative FCF</text>

                </svg>

            </div>
        </div>

        <!-- Bottom Bar: Source + URL -->
        <div class="bottom-bar">
            <div class="source">Source: ACME Corp 10-K Filing (FY2025), SEC XBRL</div>
            <div class="brand-url">robosystems.dev</div>
        </div>

    </div>
</body>
</html>
